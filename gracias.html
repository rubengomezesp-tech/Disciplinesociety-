<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estás dentro · Discipline Society</title>
<meta name="description" content="Gracias. Estás en la lista privada.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0908;--ink:#f5f2ec;--ink-dim:#a8a39a;--gold:#c9a961;
    --line:rgba(201,169,97,.18);
    --serif:"Cormorant Garamond",serif;
    --sans:"Inter Tight",-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:32px;line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background:
      radial-gradient(ellipse at 20% 30%,rgba(201,169,97,.1),transparent 55%),
      radial-gradient(ellipse at 80% 70%,rgba(201,169,97,.05),transparent 55%);
  }
  .wrap{
    max-width:640px;text-align:center;position:relative;z-index:2;
    padding:64px 40px;border:1px solid var(--line);
  }
  .wrap::before,.wrap::after{
    content:"";position:absolute;width:18px;height:18px;border:1px solid var(--gold);
  }
  .wrap::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
  .wrap::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
  .tag{
    display:inline-flex;align-items:center;gap:12px;
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--gold);margin-bottom:32px;
  }
  .tag::before,.tag::after{content:"";width:30px;height:1px;background:var(--gold)}
  h1{
    font-family:var(--serif);font-size:clamp(48px,8vw,96px);font-weight:400;
    line-height:.95;letter-spacing:-.02em;margin-bottom:28px;
  }
  h1 em{font-style:italic;color:var(--gold);font-weight:400}
  p{color:var(--ink-dim);font-size:16px;max-width:440px;margin:0 auto 40px;line-height:1.8}
  .btn{
    display:inline-flex;align-items:center;gap:14px;
    padding:20px 40px;font-size:11px;letter-spacing:.25em;text-transform:uppercase;
    text-decoration:none;font-weight:500;background:var(--gold);color:var(--bg);
    transition:all .4s;
  }
  .btn:hover{background:var(--ink);transform:translateY(-2px)}
  .meta{
    margin-top:40px;font-size:10px;letter-spacing:.25em;text-transform:uppercase;
    color:var(--ink-dim);
  }
  .meta span{color:var(--gold)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="tag">Acceso Anticipado</div>
    <h1>Estás <em>dentro.</em></h1>
    <p>No te vamos a escribir mucho. Solo cuando algo importe. Drops privados, guías y fórmulas antes de que existan para el resto.</p>
    <a href="/" class="btn">Volver al inicio →</a>
    <div class="meta"><span>●</span> Revisa tu bandeja de entrada</div>
  </div>
</body>
</html>
