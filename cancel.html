<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago cancelado · Discipline Society</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter+Tight:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0908;--ink:#f5f2ec;--ink-dim:#a8a39a;--gold:#c9a961;
    --line:rgba(201,169,97,.18);
    --serif:"Cormorant Garamond",serif;
    --sans:"Inter Tight",-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:32px;line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:560px;text-align:center;padding:64px 40px;border:1px solid var(--line);
    position:relative;
  }
  .wrap::before,.wrap::after{
    content:"";position:absolute;width:18px;height:18px;border:1px solid var(--gold);
  }
  .wrap::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
  .wrap::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
  .tag{
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);
    margin-bottom:28px;display:block;
  }
  h1{
    font-family:var(--serif);font-size:clamp(40px,6vw,64px);font-weight:400;
    line-height:1;letter-spacing:-.015em;margin-bottom:24px;
  }
  h1 em{font-style:italic;color:var(--gold)}
  p{color:var(--ink-dim);font-size:15px;max-width:420px;margin:0 auto 36px;line-height:1.7}
  .btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{
    display:inline-flex;align-items:center;gap:12px;
    padding:18px 32px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    text-decoration:none;font-weight:500;transition:all .4s;
  }
  .btn-primary{background:var(--gold);color:var(--bg)}
  .btn-primary:hover{background:var(--ink)}
  .btn-secondary{border:1px solid var(--line);color:var(--ink)}
  .btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>
  <div class="wrap">
    <span class="tag">— Pago no completado —</span>
    <h1>Aún no <em>cruzaste</em> la línea.</h1>
    <p>El pago se canceló. Ningún cargo realizado. Cuando estés listo, vuelve y termina lo que empezaste.</p>
    <div class="btns">
      <a href="/#hoodie" class="btn btn-primary">Volver al hoodie →</a>
      <a href="/" class="btn btn-secondary">Inicio</a>
    </div>
  </div>
</body>
</html>
