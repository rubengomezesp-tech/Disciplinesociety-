<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceder — Discipline Society</title>
  <meta name="description" content="Accede a tu cuenta de Discipline Society." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
    }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-brand {
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #c9a961;
      margin-bottom: 3rem;
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .auth-form label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.5rem;
    }
    .auth-form input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #fff;
      padding: 0.75rem 0;
      margin-bottom: 1.75rem;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.3s ease;
      font-family: inherit;
    }
    .auth-form input:focus { border-bottom-color: #c9a961; }
    .auth-form button {
      width: 100%;
      background: transparent;
      border: 1px solid #c9a961;
      color: #c9a961;
      padding: 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
      font-family: inherit;
    }
    .auth-form button:hover:not(:disabled) { background: #c9a961; color: #000; }
    .auth-form button:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-message {
      display: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      border: 1px solid;
      text-align: center;
    }
    .form-message.error { color: #c94a4a; border-color: #c94a4a; }
    .form-message.success { color: #c9a961; border-color: #c9a961; }
    .auth-footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #666;
    }
    .auth-footer a {
      color: #c9a961;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }
    .auth-footer a:hover { border-bottom-color: #c9a961; }
    .auth-back {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: #666;
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }
    .auth-back:hover { color: #c9a961; }
    @media (max-width: 480px) {
      .auth-back { top: 1.25rem; left: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <a href="/" class="auth-back">← Volver</a>
    <div class="auth-card">
      <div class="auth-brand">Discipline Society</div>
      <h1 class="auth-title">Acceder</h1>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-message"></div>

        <label for="email">Correo</label>
        <input type="email" id="email" name="email" required autocomplete="email" />

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />

        <button type="submit">Entrar</button>
      </form>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="/registro">Regístrate</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { handleLogin } from '/assets/js/auth.js';
    document.getElementById('login-form').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
